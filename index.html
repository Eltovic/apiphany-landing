<script>
  // Babel standalone may miss DOMContentLoaded if CDN scripts load slowly.
  // This ensures the transform always runs.
  (function ensureBabel() {
    function run() {
      if (typeof Babel !== 'undefined' && document.getElementById('root').childElementCount === 0) {
        Babel.transformScriptTags();
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', run);
    }
    window.addEventListener('load', run);
    // Final fallback: retry after a short delay
    setTimeout(run, 200);
  })();
</script>
